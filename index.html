<script>
  const APPS_SCRIPT_URL = "https://script.google.com/a/macros/dje.go.kr/s/AKfycbwo94JuwGEqrKYX2nKzjjstHhLmuUjt7Cu3B1GNy3xJbqLzI4WTpgCSoK8eg60TQ-7u/exec";
  const FAMILY_MAX = 6;
  const STORAGE_KEY = "dongmyeong-family-survey-v1";

  const form = document.getElementById("surveyForm");
  const familyWrap = document.getElementById("familyWrap");
  const familyTemplate = document.getElementById("familyTemplate");
  const addFamilyBtn = document.getElementById("addFamilyBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  const resetBtn = document.getElementById("resetBtn");
  const statusBox = document.getElementById("status");

  function showStatus(message, type = "success") {
    statusBox.textContent = message;
    statusBox.className = `status show ${type}`;
  }

  function clearStatus() {
    statusBox.className = "status";
    statusBox.textContent = "";
  }

  function reindexFamilies() {
    const cards = [...familyWrap.querySelectorAll(".family-card")];
    cards.forEach((card, index) => {
      card.querySelector(".family-index").textContent = index + 1;
      card.querySelectorAll("[data-name]").forEach((input) => {
        const key = input.dataset.name;
        input.name = `family_${index + 1}_${key}`;
      });
      const removeBtn = card.querySelector(".remove-family");
      removeBtn.style.display = cards.length === 1 ? "none" : "inline-flex";
    });
    addFamilyBtn.disabled = cards.length >= FAMILY_MAX;
  }

  function addFamilyCard(data = {}) {
    const fragment = familyTemplate.content.cloneNode(true);
    const card = fragment.querySelector(".family-card");
    card.querySelectorAll("[data-name]").forEach((input) => {
      const key = input.dataset.name;
      input.value = data[key] ?? "";
    });
    card.querySelector(".remove-family").addEventListener("click", () => {
      card.remove();
      reindexFamilies();
      saveDraft();
    });
    familyWrap.appendChild(card);
    reindexFamilies();
  }

  function getFormData() {
    const fd = new FormData(form);
    const families = [...familyWrap.querySelectorAll(".family-card")].map((card) => ({
      relation: card.querySelector('[data-name="relation"]').value.trim(),
      liveTogether: card.querySelector('[data-name="liveTogether"]').value,
      closeness: card.querySelector('[data-name="closeness"]').value,
      memo: card.querySelector('[data-name="memo"]').value.trim()
    }));

    return {
      submittedAt: new Date().toISOString(),
      school: "동명중학교",
      basicInfo: {
        grade: fd.get("grade") || "",
        classroom: fd.get("classroom") || "",
        number: fd.get("number") || "",
        studentName: fd.get("studentName") || "",
        guardianName: fd.get("guardianName") || "",
        guardianPhone: fd.get("guardianPhone") || "",
        guardianRelation: fd.get("guardianRelation") || ""
      },
      familyInfo: families,
      studentLife: {
        homeAttitude: fd.get("homeAttitude") || "",
        schoolLife: fd.get("schoolLife") || "",
        healthNote: fd.get("healthNote") || "",
        financialSupport: fd.get("financialSupport") || "",
        strengths: fd.get("strengths") || "",
        improvements: fd.get("improvements") || ""
      },
      academicInfo: {
        decisionMaker: fd.get("decisionMaker") || "",
        studyGuideStyle: fd.get("studyGuideStyle") || "",
        privateEdu: fd.get("privateEdu") || "",
        studyHabit: fd.get("studyHabit") || "",
        homeActivity: fd.get("homeActivity") || "",
        careerHope: fd.get("careerHope") || ""
      },
      extraInfo: {
        teacherNeedToKnow: fd.get("teacherNeedToKnow") || "",
        etcNote: fd.get("etcNote") || "",
        agree: !!fd.get("agree")
      }
    };
  }

  function downloadJSON(data) {
    const studentName = data.basicInfo.studentName || "학생";
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `동명중_가정기초조사_${studentName}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function saveDraft() {
    const data = getFormData();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function restoreDraft() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      addFamilyCard();
      return;
    }

    try {
      const data = JSON.parse(raw);
      const b = data.basicInfo || {};
      const s = data.studentLife || {};
      const a = data.academicInfo || {};
      const e = data.extraInfo || {};

      const map = {
        grade: b.grade,
        classroom: b.classroom,
        number: b.number,
        studentName: b.studentName,
        guardianName: b.guardianName,
        guardianPhone: b.guardianPhone,
        guardianRelation: b.guardianRelation,
        homeAttitude: s.homeAttitude,
        schoolLife: s.schoolLife,
        healthNote: s.healthNote,
        financialSupport: s.financialSupport,
        strengths: s.strengths,
        improvements: s.improvements,
        decisionMaker: a.decisionMaker,
        studyGuideStyle: a.studyGuideStyle,
        privateEdu: a.privateEdu,
        studyHabit: a.studyHabit,
        homeActivity: a.homeActivity,
        careerHope: a.careerHope,
        teacherNeedToKnow: e.teacherNeedToKnow,
        etcNote: e.etcNote
      };

      Object.entries(map).forEach(([id, value]) => {
        const el = document.getElementById(id);
        if (el && value != null) el.value = value;
      });

      document.getElementById("agree").checked = !!e.agree;

      const families = Array.isArray(data.familyInfo) && data.familyInfo.length ? data.familyInfo : [{}];
      families.slice(0, FAMILY_MAX).forEach((family) => addFamilyCard(family));
    } catch (error) {
      addFamilyCard();
    }
  }

  addFamilyBtn.addEventListener("click", () => {
    const count = familyWrap.querySelectorAll(".family-card").length;
    if (count >= FAMILY_MAX) return;
    addFamilyCard();
    saveDraft();
  });

  downloadBtn.addEventListener("click", () => {
    if (!form.reportValidity()) return;
    const data = getFormData();
    downloadJSON(data);
    showStatus("응답 내용을 JSON 파일로 내려받았습니다.", "success");
  });

  resetBtn.addEventListener("click", () => {
    if (!confirm("입력 중인 내용을 모두 지울까요?")) return;
    form.reset();
    familyWrap.innerHTML = "";
    addFamilyCard();
    localStorage.removeItem(STORAGE_KEY);
    clearStatus();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  form.addEventListener("input", saveDraft);
  form.addEventListener("change", saveDraft);

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    clearStatus();

    if (!form.reportValidity()) {
      showStatus("필수 문항을 모두 입력해 주세요.", "error");
      return;
    }

    const data = getFormData();

    if (!APPS_SCRIPT_URL) {
      downloadJSON(data);
      showStatus("제출용 서버 주소가 연결되지 않아 응답을 JSON으로 내려받았습니다. 운영 시에는 APPS_SCRIPT_URL을 연결해 주세요.", "error");
      return;
    }

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
      });

      showStatus("설문이 제출되었습니다. 잠시 후 응답 시트를 확인해 주세요.", "success");
      localStorage.removeItem(STORAGE_KEY);
      form.reset();
      familyWrap.innerHTML = "";
      addFamilyCard();
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (error) {
      downloadJSON(data);
      showStatus("제출 중 문제가 발생하여 응답 내용을 JSON으로 내려받았습니다. 앱스 스크립트 주소와 배포 설정을 확인해 주세요.", "error");
    }
  });

  restoreDraft();
</script>
